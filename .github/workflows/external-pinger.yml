name: external-pinger
# Jugaad cron-throttle workaround (2026-05-18).
#
# Problem: GitHub Actions throttles `schedule:` events on free repos, often
# delaying nominal 5/15-min crons to 60-180+ min actual cadence. Our oil,
# vessel, news, currency, gdelt, aircraft scrapers all suffer.
#
# Solution: this workflow fans out to dispatch all the time-sensitive
# scrapers in parallel via `workflow_dispatch` (which is NOT throttled).
# Pair with an external pinger (cron-job.org, EasyCron, etc) configured
# to POST to:
#
#   https://api.github.com/repos/aniketkulkarni420/hormuz-watch/actions/workflows/external-pinger.yml/dispatches
#
# with body {"ref":"main"} and a fine-grained PAT (workflow scope).
# Recommended pinger cadence: every 10 min.
#
# Wire-up (one-time, ~5 min):
#   1. github.com → Settings → Developer settings → Personal access tokens
#      → Fine-grained tokens → Generate new token
#      Repository access: this repo only
#      Permissions: Actions → Read and write
#   2. cron-job.org (free) → Create cron job
#      URL: <api URL above>
#      Method: POST
#      Headers:
#        Authorization: Bearer ghp_<your-token>
#        Accept: application/vnd.github+json
#      Body (raw JSON): {"ref":"main"}
#      Schedule: every 10 min
#   3. Done. Scrapers will run at true 10-min cadence.

on:
  workflow_dispatch:

permissions:
  actions: write   # needed to dispatch other workflows

jobs:
  fanout:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Dispatch time-sensitive scrapers in parallel
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          for wf in oil-stooq.yml vessel-scrape.yml news-scraper.yml gdelt-scraper.yml currency-scraper.yml aircraft-scraper.yml ais-scraper.yml; do
            echo "→ dispatching $wf"
            gh workflow run "$wf" --ref main || echo "  (failed but continuing)"
          done
          echo "✓ Fanout complete · $(date -u +%Y-%m-%dT%H:%M:%SZ)"
