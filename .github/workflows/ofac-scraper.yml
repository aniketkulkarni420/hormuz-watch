name: ofac-scraper

on:
  schedule:
    # Every 6 hours — OFAC publishes infrequently (typically 1-3x/week).
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: pip install --quiet requests
      - name: Run OFAC scraper
        env:
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_KV_NAMESPACE_ID: ${{ secrets.CF_KV_NAMESPACE_ID }}
        shell: bash
        run: |
          set -o pipefail
          python scripts/scrape_ofac.py 2>&1 | tee /tmp/ofac-scrape.log
      - name: Upload log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ofac-scrape-${{ github.run_id }}
          path: /tmp/ofac-scrape.log
          retention-days: 14
