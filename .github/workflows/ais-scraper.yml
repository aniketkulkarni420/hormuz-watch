name: vessel-sync

on:
  schedule:
    # Every 30 min (was */5 = 288 runs/day). AISStream has been in a multi-week
    # provider outage — the scraper produces 0 messages every run. Recovery
    # detection works fine at 30-min cadence; the old rate burned ~9 GHA-hours/
    # day on a guaranteed-failure job and risked schedule throttling for the
    # whole repo. Restore */5 only when the provider is confirmed back.
    # (Batch C · 2026-05-14)
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 4
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install --quiet websockets==12.0 requests
      - name: Run scraper
        env:
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_KV_NAMESPACE_ID: ${{ secrets.CF_KV_NAMESPACE_ID }}
          AIS_KEY: ${{ secrets.AIS_KEY }}
          RESEND_KEY: ${{ secrets.RESEND_KEY }}
          ALERT_EMAIL: ${{ secrets.ALERT_EMAIL }}
        run: python scripts/scrape_ais.py 2>&1 | tee /tmp/scrape.log
      - name: Upload log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scrape-log-ais-${{ github.run_id }}
          path: /tmp/scrape.log
          retention-days: 7
