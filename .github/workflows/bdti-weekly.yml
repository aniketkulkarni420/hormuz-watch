name: bdti-daily
on:
  schedule:
    - cron: "0 14 * * 1-5"   # Mon-Fri 14:00 UTC — Baltic publishes ~13:00 UTC, 1h buffer
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      # StockQ is plain HTML — no browser needed. (Was: playwright + chromium.)
      - name: Install deps
        run: pip install --quiet requests
      - name: Run BDTI scraper
        env:
          SNAPSHOT_TOKEN: ${{ secrets.SNAPSHOT_TOKEN }}
          SITE_URL: ${{ secrets.SITE_URL }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_KV_NAMESPACE_ID: ${{ secrets.CF_KV_NAMESPACE_ID }}
        shell: bash
        run: |
          set -o pipefail
          python scripts/scrape_bdti.py 2>&1 | tee /tmp/scrape.log
      - name: Upload log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scrape-log-bdti-${{ github.run_id }}
          path: /tmp/scrape.log
          retention-days: 14
