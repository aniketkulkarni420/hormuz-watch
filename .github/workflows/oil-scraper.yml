name: data-refresh

on:
  # 2026-05-22: native cron reduced from ~75 runs/day to 2 runs/day. Most of
  # what data-refresh fetches is EIA daily / EIA weekly / OPEC STEO monthly —
  # not real-time. The /api/admin/refresh pinger fanout (every 30 min) covers
  # this workflow when intra-day spot prices matter; the 2x/day native cron
  # is a safety net so EIA daily reference is fresh even if the pinger fails.
  schedule:
    - cron: "30 14 * * 1-5"   # Mon-Fri 14:30 UTC — after EIA weekly publish (Wed) buffer
    - cron: "30 2 * * 1-5"    # Mon-Fri 02:30 UTC — overnight refresh for Asian session
  workflow_dispatch:
    inputs:
      force_snapshot:
        description: 'Set to 1 to force /api/record call'
        required: false
        default: ''

permissions:
  contents: read

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install --quiet yfinance==0.2.55 requests
      - name: Run scraper
        env:
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_KV_NAMESPACE_ID: ${{ secrets.CF_KV_NAMESPACE_ID }}
          EIA_KEY: ${{ secrets.EIA_KEY }}
          SNAPSHOT_TOKEN: ${{ secrets.SNAPSHOT_TOKEN }}
          SITE_URL: ${{ secrets.SITE_URL }}
          FORCE_SNAPSHOT: ${{ inputs.force_snapshot || '' }}
        run: python scripts/scrape_oil.py 2>&1 | tee /tmp/scrape.log
      - name: Upload log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scrape-log-oil-${{ github.run_id }}
          path: /tmp/scrape.log
          retention-days: 7
