name: watchdog
# 2026-05-29: schedule REMOVED — superseded by Cloudflare /api/selfheal
# (auto-remediation + escalation) and /api/digest (daily readiness email),
# both of which use the Resend key that already lives in Cloudflare. This
# GitHub watchdog can't email (no Resend key in GitHub secrets) so the hourly
# cron was burning Actions minutes for nothing. Kept as manual-only fallback.
on:
  workflow_dispatch:
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run diag check
        env:
          SNAPSHOT_TOKEN: ${{ secrets.SNAPSHOT_TOKEN }}
          RESEND_KEY: ${{ secrets.RESEND_KEY }}
          ALERT_EMAIL: ${{ secrets.ALERT_EMAIL }}
        run: |
          DIAG=$(curl -sf "https://hormuz-watch-2.pages.dev/api/diag?token=$SNAPSHOT_TOKEN")
          echo "$DIAG" | python3 -m json.tool || (echo "diag failed to parse"; exit 1)
          HEALTHY=$(echo "$DIAG" | python3 -c "import sys,json; print(json.load(sys.stdin).get('healthy', False))")
          if [ "$HEALTHY" != "True" ]; then
            STALE=$(echo "$DIAG" | python3 -c "import sys,json; print(','.join(json.load(sys.stdin).get('staleFeeds',[])))")
            echo "::warning::Stale feeds: $STALE"
            if [ -n "$RESEND_KEY" ] && [ -n "$ALERT_EMAIL" ]; then
              curl -X POST https://api.resend.com/emails \
                -H "Authorization: Bearer $RESEND_KEY" \
                -H "Content-Type: application/json" \
                -d "{\"from\":\"Hormuz Watch <onboarding@resend.dev>\",\"to\":[\"$ALERT_EMAIL\"],\"subject\":\"Hormuz Watch — feeds stale\",\"text\":\"Stale feeds: $STALE\\n\\nFull diag: $DIAG\"}"
            fi
          else
            echo "All feeds healthy."
          fi
