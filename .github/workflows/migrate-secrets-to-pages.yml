name: migrate-secrets-to-pages
# One-shot helper: copy secrets from GitHub Secrets / inputs into CF Pages env.
# Delete this workflow after first successful run.
#
# Usage:
#   1. (Optional) Provide gfw_token + eia_key as workflow inputs to override.
#   2. Run via workflow_dispatch. Values are passed to wrangler via stdin; never echoed.

on:
  workflow_dispatch:
    inputs:
      gfw_token:
        description: 'GFW token (paste from old project Settings → Env vars → reveal). Leave blank to skip.'
        required: false
        default: ''
      eia_key_override:
        description: 'Override EIA_KEY. Leave blank to use GitHub Secret EIA_KEY.'
        required: false
        default: ''

jobs:
  migrate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install wrangler
        run: npm install --no-save wrangler@latest
      - name: Migrate EIA_KEY (from GitHub Secret or input)
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          EIA_KEY_VALUE: ${{ inputs.eia_key_override != '' && inputs.eia_key_override || secrets.EIA_KEY }}
        run: |
          if [ -z "$EIA_KEY_VALUE" ]; then
            echo "::warning::No EIA_KEY value available; skipping"
            exit 0
          fi
          # Pipe value via stdin so it never appears in logs
          printf "%s" "$EIA_KEY_VALUE" | npx wrangler pages secret put EIA_KEY --project-name=hormuz-watch-2 2>&1 | grep -v "$EIA_KEY_VALUE" || true
          echo "✓ EIA_KEY set on hormuz-watch-2"
      - name: Migrate GFW_TOKEN (from input)
        if: inputs.gfw_token != ''
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          GFW_TOKEN_VALUE: ${{ inputs.gfw_token }}
        run: |
          printf "%s" "$GFW_TOKEN_VALUE" | npx wrangler pages secret put GFW_TOKEN --project-name=hormuz-watch-2 2>&1 | grep -v "$GFW_TOKEN_VALUE" || true
          echo "✓ GFW_TOKEN set on hormuz-watch-2"
      - name: Trigger retry deployment so new secrets load
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
        run: |
          echo "New secrets need a redeploy to load. Trigger via wrangler:"
          # Use the deploy-hook approach if available; otherwise list deployments and retry latest
          npx wrangler pages deployment list --project-name=hormuz-watch-2 2>&1 | head -10
          echo "::notice::Open https://dash.cloudflare.com → hormuz-watch-2 → Deployments → ⋯ → Retry deployment"
      - name: Verify
        run: |
          echo "Sleeping 30s for any in-flight redeploy..."
          sleep 30
          CODE_EIA=$(curl -s -o /dev/null -w "%{http_code}" "https://hormuz-watch-2.pages.dev/api/eia?series=RBRTE&length=2")
          CODE_GFW=$(curl -s -o /dev/null -w "%{http_code}" -X POST -H "Content-Type: application/json" -d '{}' "https://hormuz-watch-2.pages.dev/api/gfw")
          echo "/api/eia → HTTP $CODE_EIA (want 200 for success)"
          echo "/api/gfw → HTTP $CODE_GFW (200 ok; 500 = token still missing or invalid)"
