name: aircraft-scraper

on:
  schedule:
    # Every 15 min = 96/day, well under OpenSky anonymous tier 100/day
    - cron: "4,19,34,49 * * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install --quiet requests
      - name: Run scraper
        env:
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_KV_NAMESPACE_ID: ${{ secrets.CF_KV_NAMESPACE_ID }}
        run: python scripts/scrape_aircraft.py 2>&1 | tee /tmp/aircraft.log
      - name: Upload log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scrape-log-aircraft-${{ github.run_id }}
          path: /tmp/aircraft.log
          retention-days: 7
