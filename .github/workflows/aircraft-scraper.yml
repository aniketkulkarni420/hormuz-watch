name: aircraft-scraper

on:
  # 2026-05-22: native cron disabled — /api/admin/refresh pinger fanout
  # (every 30 min) is now the sole driver. Cuts KV writes against the
  # 1000/day free-tier limit.
  workflow_dispatch:

permissions:
  contents: read

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install --quiet requests
      - name: Run scraper
        env:
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_KV_NAMESPACE_ID: ${{ secrets.CF_KV_NAMESPACE_ID }}
        shell: bash
        run: |
          set -o pipefail
          python scripts/scrape_aircraft.py 2>&1 | tee /tmp/aircraft.log
      - name: Upload log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scrape-log-aircraft-${{ github.run_id }}
          path: /tmp/aircraft.log
          retention-days: 7
