name: ukmto-scraper
# UKMTO maritime incidents — the real conflict-event feed (2026-06-10).
# Source is the Royal Navy JSON API behind ukmto.org; plain requests, no browser.
on:
  schedule:
    - cron: "20 */2 * * *"   # every 2h nominal (GHA throttles free repos)
  workflow_dispatch:

permissions:
  contents: read

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 4
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: pip install --quiet requests
      - name: Run UKMTO scraper
        env:
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_KV_NAMESPACE_ID: ${{ secrets.CF_KV_NAMESPACE_ID }}
        # pipefail: tee must never mask a failing scraper (4.4-day-stale lesson)
        shell: bash
        run: |
          set -o pipefail
          python scripts/scrape_ukmto.py 2>&1 | tee /tmp/scrape.log
      - name: Upload log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scrape-log-ukmto-${{ github.run_id }}
          path: /tmp/scrape.log
          retention-days: 7
