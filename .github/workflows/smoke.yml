name: smoke-test
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve target URL
        id: target
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            SHA=$(git rev-parse --short=7 HEAD)
            URL="https://${SHA}.hormuz-watch.pages.dev"
          else
            URL="https://hormuz-watch-2.pages.dev"
          fi
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "Target URL: $URL"

      - name: Wait for CF Pages deploy
        run: sleep 180   # bumped from 120 — new Functions need longer to register

      - name: Run smoke checks (with CF routing lag tolerance)
        env:
          BASE: ${{ steps.target.outputs.url }}
        run: |
          set -e

          # check_endpoint <path> <pattern> <expect_json>
          # Retries once after 60s if response looks like the homepage HTML
          # (CF Pages occasionally fails to register new Functions on first deploy).
          check_endpoint() {
            local path="$1"
            local pattern="$2"
            local expect_json="${3:-1}"
            local url="${BASE}${path}"
            local attempt=1
            local max_attempts=2

            while [ $attempt -le $max_attempts ]; do
              echo "[$path] attempt $attempt/$max_attempts"
              R=$(curl -sf "$url" || echo "__CURL_FAIL__")

              if [ "$R" = "__CURL_FAIL__" ]; then
                echo "  curl failed (non-2xx)"
              elif echo "$R" | grep -q "$pattern"; then
                echo "  ✓ matched '$pattern'"
                return 0
              elif [ "$expect_json" = "1" ] && echo "$R" | head -c 50 | grep -q "<!DOCTYPE\|<html"; then
                echo "  ⚠ got HTML (likely CF Pages routing lag for new Function)"
                if [ $attempt -lt $max_attempts ]; then
                  echo "  → sleeping 60s and retrying once..."
                  sleep 60
                fi
              else
                echo "  ✗ no match for '$pattern'"
                echo "  Response head: $(echo "$R" | head -c 200)"
              fi
              attempt=$((attempt + 1))
            done

            echo "FAIL: $path after $max_attempts attempts"
            echo "Full response: $R"
            return 1
          }

          check_endpoint "/"               "HORMUZ WATCH"  0
          check_endpoint "/api/oil"        '"tier"'        1
          check_endpoint "/api/ais"        '"summary"'     1
          check_endpoint "/api/snapshot"   '"as_of"'       1
          check_endpoint "/api/bdti"       '"value"'       1
          check_endpoint "/health"         "Hormuz Watch"  0

      - name: Check 404 page exists
        run: |
          C=$(curl -s -o /dev/null -w "%{http_code}" "${{ steps.target.outputs.url }}/nonexistent-xyz-123")
          [[ "$C" == "404" || "$C" == "200" ]] || (echo "404 page returned $C"; exit 1)
