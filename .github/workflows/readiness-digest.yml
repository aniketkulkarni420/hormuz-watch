name: readiness-digest
# Tier 3G (2026-05-28) — one email each morning with the showcase verdict.
# So the operator reads ONE email/day instead of checking the dashboard.
# Pulls /api/integrity (public validator: freshness + sanity + accuracy per
# feed) + an independent oil cross-check vs Yahoo Finance, then emails a
# one-line "SHOWCASE READY" / "NOT READY — fix X" digest via Resend.

on:
  schedule:
    - cron: "30 6 * * *"   # 06:30 UTC daily (~12:00 IST) — before a typical viewing window
  workflow_dispatch:        # run on demand any time

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build + send readiness digest
        env:
          RESEND_KEY: ${{ secrets.RESEND_KEY }}
          ALERT_EMAIL: ${{ secrets.ALERT_EMAIL }}
        run: |
          python3 - <<'PY'
          import json, os, urllib.request, datetime

          SITE = "https://hormuz-watch-2.pages.dev"

          def get(url, timeout=25):
              req = urllib.request.Request(url, headers={"User-Agent": "readiness-digest/1.0"})
              with urllib.request.urlopen(req, timeout=timeout) as r:
                  return json.loads(r.read().decode())

          lines = []
          ready = False
          try:
              integ = get(f"{SITE}/api/integrity?_={datetime.datetime.utcnow().timestamp()}")
              ready = bool(integ.get("showcase_ready"))
              blocking = integ.get("blocking", [])
              feeds = integ.get("feeds", {})
              lines.append(f"showcase_ready: {ready}")
              lines.append(f"blocking feeds: {integ.get('blocking_count', 0)}")
              for b in blocking:
                  lines.append(f"  - {b}")
              lines.append("")
              lines.append("per-feed:")
              for k, v in feeds.items():
                  lines.append(f"  {k:10s} {v.get('status'):14s} {v.get('reason','')[:70]}")
          except Exception as e:
              lines.append(f"INTEGRITY FETCH FAILED: {e}")
              ready = False

          # Independent oil accuracy cross-check vs Yahoo (only runs once/day so
          # the external call is fine here — kept OUT of the live /api/integrity).
          try:
              oil = get(f"{SITE}/api/oil")
              y_b = get("https://query1.finance.yahoo.com/v8/finance/chart/BZ=F?range=1d&interval=1d")
              yb = y_b["chart"]["result"][0]["meta"]["regularMarketPrice"]
              db = oil.get("brent", {}).get("level")
              if db and yb:
                  diff = abs(db - yb) / yb * 100
                  flag = "OK" if diff < 2 else "DRIFT"
                  lines.append("")
                  lines.append(f"oil accuracy: dashboard Brent ${db} vs Yahoo ${yb} = {diff:.2f}% [{flag}]")
                  if diff >= 2:
                      ready = False
                      lines.append("  -> Brent drifted >2% from Yahoo — investigate oil scraper")
          except Exception as e:
              lines.append(f"oil cross-check skipped: {e}")

          subject = ("Hormuz Watch — SHOWCASE READY" if ready
                     else "Hormuz Watch — NOT READY (action needed)")
          body = ("Daily readiness digest · " +
                  datetime.datetime.utcnow().strftime("%Y-%m-%d %H:%M UTC") + "\n\n" +
                  ("All systems live + accurate. Safe to showcase.\n\n" if ready
                   else "ONE OR MORE FEEDS NEED ATTENTION:\n\n") +
                  "\n".join(lines) +
                  f"\n\nFull validator: {SITE}/api/integrity\nDashboard: {SITE}/")

          print(subject)
          print(body)

          rk, em = os.environ.get("RESEND_KEY"), os.environ.get("ALERT_EMAIL")
          if rk and em:
              payload = json.dumps({
                  "from": "Hormuz Watch <onboarding@resend.dev>",
                  "to": [em], "subject": subject, "text": body,
              }).encode()
              req = urllib.request.Request("https://api.resend.com/emails", data=payload,
                  headers={"Authorization": f"Bearer {rk}", "Content-Type": "application/json"})
              try:
                  with urllib.request.urlopen(req, timeout=20) as r:
                      print("email sent:", r.status)
              except Exception as e:
                  print("email send failed:", e)
          else:
              print("RESEND_KEY/ALERT_EMAIL not set — digest printed to log only")
          PY
