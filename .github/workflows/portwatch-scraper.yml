name: portwatch-scraper
# IMF PortWatch daily Hormuz transits — true strait crossings, lagged ~5-10d (2026-06-12).
# Open ArcGIS API, no key. Updates weekly (Tue); daily cron is cheap insurance.
on:
  schedule:
    - cron: "50 6 * * *"   # daily 06:50 UTC (source updates weekly Tue)
  workflow_dispatch:

permissions:
  contents: read

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 4
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: pip install --quiet requests
      - name: Run PortWatch scraper
        env:
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_KV_NAMESPACE_ID: ${{ secrets.CF_KV_NAMESPACE_ID }}
        # pipefail: tee must never mask a failing scraper (4.4-day-stale lesson)
        shell: bash
        run: |
          set -o pipefail
          python scripts/scrape_portwatch.py 2>&1 | tee /tmp/scrape.log
      - name: Upload log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scrape-log-portwatch-${{ github.run_id }}
          path: /tmp/scrape.log
          retention-days: 7
