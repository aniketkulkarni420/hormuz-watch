name: oil-stooq
# 2026-06-10: source migrated Stooq -> Yahoo v8 chart API (Stooq now behind a
# JS proof-of-work wall; was silently failing for 4.4 days because `| tee`
# without pipefail masked the script's exit 1). Workflow name kept (selfheal's
# FEED_WORKFLOW map + cron-job.org fanout reference oil-stooq.yml).
on:
  schedule:
    # Every 15 minutes — primary live oil source; writes `oil_scraped` KV so
    # /api/oil Tier 0 ("tier0-xverified") fires.
    - cron: "*/15 * * * *"
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 4
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: pip install --quiet requests
      - name: Run oil scraper (Yahoo + OPA cross-verify)
        env:
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_KV_NAMESPACE_ID: ${{ secrets.CF_KV_NAMESPACE_ID }}
        # pipefail: without it, `| tee` returns tee's exit 0 and a failing
        # scraper reports green — exactly how the 4.4-day stale-oil incident
        # stayed invisible. Never remove.
        shell: bash
        run: |
          set -o pipefail
          python scripts/scrape_oil_stooq.py 2>&1 | tee /tmp/scrape.log
      - name: Upload log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scrape-log-oil-stooq-${{ github.run_id }}
          path: /tmp/scrape.log
          retention-days: 7
