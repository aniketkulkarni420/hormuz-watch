name: oil-stooq
on:
  schedule:
    # Every 15 minutes — Stooq publishes intraday Brent/WTI from exchange
    # feeds, plain CSV (no browser). This is the primary live oil source;
    # writes `oil_scraped` KV with confidence "high" so /api/oil Tier 0 fires
    # and the dashboard's Market Pulse stops reading OilPriceAPI demo data.
    - cron: "*/15 * * * *"
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 4
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: pip install --quiet requests
      - name: Run Stooq oil scraper
        env:
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_KV_NAMESPACE_ID: ${{ secrets.CF_KV_NAMESPACE_ID }}
        run: python scripts/scrape_oil_stooq.py 2>&1 | tee /tmp/scrape.log
      - name: Upload log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scrape-log-oil-stooq-${{ github.run_id }}
          path: /tmp/scrape.log
          retention-days: 7
