<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Not found · Hormuz Watch</title>
<meta name="robots" content="noindex,nofollow">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#07090e;--panel:#0b0e16;--border:#18202e;
  --amber:#f09014;--blue:#38aaff;
  --text:#cdd8e8;--muted:#8099b3;--muted2:#627a95;
  --mono:'JetBrains Mono',monospace;--sans:'Manrope',sans-serif;
}
body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:40px}
.wrap{max-width:560px;text-align:center}
.code{font-family:var(--mono);font-size:64px;font-weight:800;color:var(--amber);letter-spacing:-.02em;line-height:1}
.title{font-size:22px;font-weight:800;margin:18px 0 10px;letter-spacing:-.005em}
.sub{font-family:var(--mono);font-size:13px;color:var(--muted);line-height:1.6}
.actions{margin-top:28px;display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.btn{display:inline-block;font-family:var(--mono);font-size:11px;letter-spacing:.06em;text-transform:uppercase;text-decoration:none;padding:10px 18px;border-radius:3px;font-weight:700}
.btn-primary{background:var(--amber);color:#000}
.btn-secondary{background:var(--panel);color:var(--text);border:1px solid var(--border)}
.btn:hover{filter:brightness(1.1)}
.foot{margin-top:42px;font-family:var(--mono);font-size:10px;color:var(--muted2);letter-spacing:.04em}
.foot a{color:var(--blue);text-decoration:none}
</style>
</head>
<body>
<div class="wrap">
  <div class="code">404</div>
  <div class="title">Page not found</div>
  <div class="sub">The route you requested isn't part of the dashboard. The chokepoint is still open — you just took a wrong turn.</div>
  <div class="actions">
    <a class="btn btn-primary" href="/">Back to dashboard</a>
    <a class="btn btn-secondary" href="/methodology">Methodology</a>
  </div>
  <div class="foot">© 2026 Aniket Kulkarni · <a href="/terms">Terms</a></div>
</div>
</body>
</html>
